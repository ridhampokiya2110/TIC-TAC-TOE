apiVersion: apps/v1
kind: Deployment
metadata:
  name: tic-tac-toe-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tic-tac-toe
  template:
    metadata:
      labels:
        app: tic-tac-toe
    spec:
      containers:
      - name: game-container
        image: DOCKER_USER_PLACEHOLDER/tic-tac-toe-app:latest
        ports:
        - containerPort: 80